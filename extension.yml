schema_version: "1.0"

extension:
  id: "lite"
  name: "Lite"
  version: "1.0.0"
  description: "Zero-ceremony implementation for simple tasks. Clarify Jira issues against the codebase, implement in one pass, and write a summary to specs/lite/summary.md."
  author: "Tim Riffer"
  repository: "https://github.com/triffer/spec-kit-lite"
  license: "MIT"
  homepage: "https://github.com/triffer/spec-kit-lite"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "jira"
      required: false

provides:
  commands:
    - name: "speckit.lite.clarify"
      file: "commands/clarify.md"
      description: "Read a Jira issue and clarify it against this repository. Identifies context, impact, potential problems, and recommends next steps."

    - name: "speckit.lite.implement"
      file: "commands/implement.md"
      description: "Implement a simple task in one pass. Scans the codebase, makes the change, runs tests/build, and writes a summary to specs/lite/summary.md."

  config: []

tags:
  - "lightweight"
  - "quick"
  - "implementation"
  - "bugfix"

defaults: {}
